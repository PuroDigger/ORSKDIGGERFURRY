<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orsk Digger Project | Online</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <!-- Подключаем библиотеку через более стабильный сервер Google -->
    <script src="https://googleapis.com"></script>
    
    <style>
        :root { --y: #ffcc00; --b: #0a0a0a; --g: #1a1a1a; --text: #e0e0e0; --accent: #ffcc00; }
        [data-theme="bw"] { --y: #ffffff; --b: #000000; --g: #111111; --text: #ffffff; --accent: #888888; }
        [data-theme="boykisser"] { --y: #ff80ab; --b: #fff0f6; --g: #ffffff; --text: #880e4f; --accent: #f06292; }

        body { background: var(--b); color: var(--text); font-family: 'Courier New', monospace; margin: 0; transition: 0.3s; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1200px; width: 90%; margin: 0 auto; padding: 20px 0; flex: 1; }
        
        header { background: var(--y); color: var(--b); padding: 50px 0; text-align: center; border-bottom: 8px solid var(--accent); }
        .logo-img { width: 250px; height: 250px; border-radius: 50%; border: 8px solid var(--b); margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 40px rgba(0,0,0,0.6); cursor: pointer; }
        header h1 { margin: 0; font-size: 38px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; }
        
        .lvl-box { margin-top: 25px; background: rgba(0,0,0,0.5); display: inline-block; padding: 15px 30px; border: 2px solid var(--b); min-width: 320px; }
        .xp-bar { width: 100%; height: 12px; background: #333; display: block; border: 1px solid var(--b); margin-top: 10px; position: relative; }
        #xp-fill { height: 100%; background: var(--b); width: 0%; transition: 1s ease-in-out; }

        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 30px 0; }
        nav button, nav select { background: var(--g); border: 2px solid var(--y); color: var(--y); padding: 12px 18px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s; }
        nav button.active { background: var(--y); color: var(--b); }

        .page { display: none; min-height: 600px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #map-window { width: 100%; height: 600px; border: 4px solid var(--y); background: #000; overflow: auto; position: relative; }
        #map-area { position: relative; display: inline-block; min-width: 100%; }
        #map-img { display: block; width: 100%; cursor: crosshair; }
        .marker { position: absolute; width: 22px; height: 22px; background: var(--y); border: 2px solid #000; transform: translate(-50%, -50%) rotate(45deg); cursor: pointer; z-index: 10; box-shadow: 0 0 10px #000; }

        .form-section { background: var(--g); padding: 30px; border: 3px solid var(--y); margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: var(--b); border: 1px solid var(--y); color: var(--text); font-family: inherit; box-sizing: border-box; }
        .btn-send { background: var(--y); color: var(--b); border: none; padding: 20px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 2px solid var(--b); }

        .post-card { background: var(--g); padding: 25px; margin-bottom: 20px; border-left: 10px solid var(--y); box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        footer { background: var(--b); color: var(--y); text-align: center; padding: 35px; border-top: 5px solid var(--y); margin-top: 50px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <img src="assets/logo.png" class="logo-img" onclick="playMeow()">
    <h1>ORSK DIGGER PROJECT</h1>
    <div class="lvl-box">
        <span id="lvl-text" style="font-size: 18px; font-weight: bold;">Инициализация...</span>
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <div id="xp-text" style="font-size: 13px; font-weight: bold; margin-top: 5px;">0 XP</div>
    </div>
</header>

<div class="container">
    <nav>
        <button onclick="switchTab('map-page')" id="nav-map-page" class="active">КАРТА</button>
        <button onclick="switchTab('blog-page')" id="nav-blog-page">АРХИВ</button>
        <button onclick="switchTab('forum-page')" id="nav-forum-page">ФОРУМ</button>
        <button onclick="switchTab('wiki-page')" id="nav-wiki-page">ВИКИ</button>
        <button onclick="switchTab('profile-page')" id="nav-profile-page">ПРОФИЛЬ</button>
        <select onchange="changeTheme(this.value)">
            <option value="default">🌐 СТАНДАРТ</option>
            <option value="bw">☢ МОНОХРОМ</option>
            <option value="boykisser">✿ BOYKISSER :3</option>
        </select>
    </nav>

    <div id="map-page" class="page active">
        <div id="map-window">
            <div id="map-area">
                <img src="assets/maposn.jpg" id="map-img" onclick="addMarker(event)">
                <div id="markers-layer" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;"></div>
            </div>
        </div>
    </div>

    <div id="blog-page" class="page">
        <div class="form-section">
            <input type="text" id="t-title" placeholder="ОБЪЕКТ">
            <textarea id="t-body" rows="3" placeholder="ОТЧЕТ..."></textarea>
            <button class="btn-send" onclick="sendPost()">ВНЕСТИ В АРХИВ</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="forum-page" class="page">
        <div class="form-section">
            <textarea id="f-msg" rows="2" placeholder="СООБЩЕНИЕ..."></textarea>
            <button class="btn-send" onclick="sendForum()">ОТПРАВИТЬ</button>
        </div>
        <div id="forum-feed"></div>
    </div>

    <div id="wiki-page" class="page">
        <div id="wiki-feed"></div>
    </div>

    <div id="profile-page" class="page">
        <div class="form-section">
            <h2 id="prof-nick">...</h2>
            <p id="prof-xp">XP: 0</p>
            <button class="btn-send" onclick="localStorage.clear(); location.reload();">ВЫЙТИ / СБРОСИТЬ</button>
        </div>
    </div>
</div>

<footer>ORSK DIGGER 2024</footer>

<script>
    const URL = 'https://supabase.co';
    const KEY = 'sb_publishable_TMgSn4UaJ1bovISkRi5ifA_8BrIdZCA';
    let db;

    async function connect() {
        try {
            // Ждем немного, пока библиотека подгрузится из сети
            if (!window.supabase) {
                document.getElementById('lvl-text').innerText = "ОШИБКА: Библиотека не загружена. Включи VPN и обнови страницу!";
                return;
            }
            db = window.supabase.createClient(URL, KEY);
            document.getElementById('lvl-text').innerText = "Статус: ОНЛАЙН";
            initApp();
        } catch(e) {
            document.getElementById('lvl-text').innerText = "ОШИБКА СЕТИ!";
        }
    }

    let userNick = localStorage.getItem('digger_nick');
    if (!userNick) {
        let n = prompt("ТВОЙ ПОЗЫВНОЙ:");
        if (n) { 
            localStorage.setItem('digger_nick', n); 
            localStorage.setItem('digger_xp', '0');
            location.reload(); 
        }
    } else {
        connect();
    }

    async function initApp() {
        updateXPUI();
        loadBlog();
        loadForum();
        renderMarkers();
    }

    function updateXPUI() {
        let xp = parseInt(localStorage.getItem('digger_xp') || "0");
        document.getElementById('xp-text').innerText = xp + " XP";
        document.getElementById('xp-fill').style.width = Math.min(xp, 100) + "%";
    }

    // --- ФУНКЦИИ БАЗЫ ---
    async function sendPost() {
        const t = document.getElementById('t-title').value, b = document.getElementById('t-body').value;
        if(!t || !b) return;
        const { error } = await db.from('posts').insert([{ t, b, nick: userNick }]);
        if(error) alert(error.message); else { 
            alert("Опубликовано!"); 
            addXP(10); loadBlog();
            document.getElementById('t-title').value = ''; document.getElementById('t-body').value = '';
        }
    }

    async function loadBlog() {
        const { data } = await db.from('posts').select('*').order('id', { ascending: false });
        if(data) document.getElementById('feed').innerHTML = data.map(p => `<div class="post-card"><b>${p.nick}</b><h3>${p.t}</h3><p>${p.b}</p></div>`).join('');
    }

    async function sendForum() {
        const msg = document.getElementById('f-msg').value;
        if(!msg) return;
        const { error } = await db.from('forum').insert([{ msg, nick: userNick, category: 'flud' }]);
        if(error) alert(error.message); else { 
            addXP(5); loadForum();
            document.getElementById('f-msg').value = '';
        }
    }

    async function loadForum() {
        const { data } = await db.from('forum').select('*').order('id', { ascending: false });
        if(data) document.getElementById('forum-feed').innerHTML = data.map(m => `<div style="border-bottom:1px solid var(--y); padding:10px;"><b>${m.nick}:</b> ${m.msg}</div>`).join('');
    }

    async function addMarker(e) {
        const rect = e.target.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100, y = ((e.clientY - rect.top) / rect.height) * 100;
        const note = prompt("Что тут?");
        if(note) {
            await db.from('markers').insert([{ note, x, y, map_file: 'maposn.jpg' }]);
            renderMarkers();
        }
    }

    async function renderMarkers() {
        const { data } = await db.from('markers').select('*');
        const layer = document.getElementById('markers-layer'); layer.innerHTML = '';
        if(data) data.forEach(m => {
            const el = document.createElement('div'); el.className = 'marker'; 
            el.style.left = m.x + "%"; el.style.top = m.y + "%"; el.title = m.note;
            layer.appendChild(el);
        });
    }

    function addXP(v) {
        let xp = parseInt(localStorage.getItem('digger_xp') || "0") + v;
        localStorage.setItem('digger_xp', xp);
        updateXPUI();
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'profile-page') {
            document.getElementById('prof-nick').innerText = userNick;
            document.getElementById('prof-xp').innerText = "XP: " + localStorage.getItem('digger_xp');
        }
    }

    function playMeow() { new Audio('assets/meow.mp3').play().catch(()=>{}); }
</script>
</body>
</html>
