<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DIGGER NET | V5</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --bg: #000; --text: #0f0; --accent: #0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        
        .nav { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .nav a:hover { background: var(--accent); color: var(--bg); }
        
        .page { display: none; }
        .active { display: block; }

        input, textarea, select { 
            background: transparent; border: 1px solid var(--accent); 
            color: var(--text); padding: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box;
        }
        button { 
            background: var(--accent); color: var(--bg); border: none; 
            padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%;
        }

        .item-box { border: 1px solid var(--accent); padding: 15px; margin-top: 10px; background: rgba(255,255,255,0.05); }
        .msg-box { border-left: 3px solid var(--accent); padding: 5px 15px; margin-bottom: 10px; }
        
        .xp-bar { width: 100%; height: 15px; border: 1px solid var(--accent); margin: 10px 0; }
        #xp-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        /* Темы */
        body.old { --bg: #000; --text: #ffcc00; --accent: #ffcc00; }
        body.boykisser { --bg: #fff; --text: #ff69b4; --accent: #ffb6c1; }
        body.pnv { --bg: #000d00; --text: #00ff00; --accent: #004400; }
    </style>
</head>
<body>

<div class="nav">
    <a onclick="route('archive')">/Архив_Объектов</a>
    <a onclick="route('forum')">/Форум_Связь</a>
    <a onclick="route('profile')">/Профиль</a>
    <a onclick="route('settings')">/Настройки</a>
</div>

<!-- АРХИВ (Объекты) -->
<div id="archive" class="page active">
    <h2>[ ДОБАВИТЬ_НОВЫЙ_ОБЪЕКТ ]</h2>
    <div style="border: 1px dashed var(--accent); padding: 15px; margin-bottom: 20px;">
        <input type="text" id="obj-title" placeholder="Название объекта (ДШС, Бункер...)">
        <input type="text" id="obj-coords" placeholder="Координаты (необязательно)">
        <textarea id="obj-desc" placeholder="Техническое описание..."></textarea>
        <button onclick="addArchive()">ВНЕСТИ В РЕЕСТР (+50 XP)</button>
    </div>
    <div id="archive-list"></div>
</div>

<!-- ФОРУМ (Сообщения) -->
<div id="forum" class="page">
    <h2>[ ОБЩИЙ_КАНАЛ_СВЯЗИ ]</h2>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="forum-msg" placeholder="Введите сообщение...">
        <button style="width: auto;" onclick="sendChat()">ОТПРАВИТЬ (+10 XP)</button>
    </div>
    <div id="forum-list" style="margin-top: 20px;"></div>
</div>

<!-- ПРОФИЛЬ -->
<div id="profile" class="page">
    <h2>[ ID_DATA ]</h2>
    <label>ВАШ НИК:</label>
    <input type="text" id="nick-input" onchange="updateNick()">
    <div class="item-box">
        <p>RANK: <span id="rank-name">HACKER</span> [LVL <span id="user-lvl">1</span>]</p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <p>XP: <span id="user-xp-val">0</span> / 100</p>
    </div>
</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="page">
    <h2>[ CONFIG ]</h2>
    <select id="theme-sel" onchange="setTheme(this.value)">
        <option value="classic">Classic Green</option>
        <option value="old">Old (Black/Yellow)</option>
        <option value="boykisser">Boykisser:3 (Pink)</option>
        <option value="pnv">ПНВ (Night Vision)</option>
    </select>
</div>

<script>
    let gun, db;
    let state = {
        nick: localStorage.getItem('d_nick') || 'User' + Math.floor(Math.random()*999),
        xp: parseInt(localStorage.getItem('d_xp')) || 0,
        theme: localStorage.getItem('d_theme') || 'classic'
    };

    window.onload = function() {
        gun = Gun();
        db = gun.get('digger_network_v5');
        
        document.getElementById('nick-input').value = state.nick;
        document.getElementById('theme-sel').value = state.theme;
        setTheme(state.theme);
        updateUI();

        // Слушаем Объекты
        db.get('objects').map().on((data, id) => {
            if(!data || document.getElementById('obj'+id)) return;
            const el = document.createElement('div');
            el.id = 'obj'+id;
            el.className = 'item-box';
            el.innerHTML = `<strong>${data.title}</strong> <small>(${data.coords})</small><br><p>${data.desc}</p><small>Auth: ${data.author}</small>`;
            document.getElementById('archive-list').prepend(el);
        });

        // Слушаем Чат
        db.get('chat').map().on((data, id) => {
            if(!data || document.getElementById('msg'+id)) return;
            const el = document.createElement('div');
            el.id = 'msg'+id;
            el.className = 'msg-box';
            el.innerHTML = `[${new Date(data.time).toLocaleTimeString()}] <b>${data.author}:</b> ${data.text}`;
            document.getElementById('forum-list').prepend(el);
        });
    };

    window.route = (p) => {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p).classList.add('active');
    };

    window.setTheme = (t) => {
        state.theme = t;
        document.body.className = t === 'classic' ? '' : t;
        localStorage.setItem('d_theme', t);
    };

    window.updateNick = () => {
        state.nick = document.getElementById('nick-input').value;
        localStorage.setItem('d_nick', state.nick);
    };

    function updateUI() {
        const lvl = Math.floor(state.xp / 100) + 1;
        const prog = state.xp % 100;
        document.getElementById('user-lvl').innerText = lvl;
        document.getElementById('user-xp-val').innerText = prog;
        document.getElementById('xp-fill').style.width = prog + '%';
        localStorage.setItem('d_xp', state.xp);
    }

    // Логика Архива
    window.addArchive = () => {
        const title = document.getElementById('obj-title').value;
        const desc = document.getElementById('obj-desc').value;
        const coords = document.getElementById('obj-coords').value || "ЗАСЕКРЕЧЕНО";
        if(!title || !desc) return alert("Введите данные объекта!");
        
        db.get('objects').set({ title, desc, coords, author: state.nick });
        state.xp += 50;
        updateUI();
        document.getElementById('obj-title').value = '';
        document.getElementById('obj-desc').value = '';
    };

    // Логика Форума
    window.sendChat = () => {
        const text = document.getElementById('forum-msg').value;
        if(!text) return;
        
        db.get('chat').set({ text, author: state.nick, time: Date.now() });
        state.xp += 10;
        updateUI();
        document.getElementById('forum-msg').value = '';
    };
</script>
</body>
</html>
