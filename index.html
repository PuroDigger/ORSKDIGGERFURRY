<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DIGGER NET | GUN DB</title>
    <!-- Подключаем библиотеку. Если скачал локально, замени адрес на "gun.js" -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --bg: #000; --text: #0f0; --accent: #0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .nav { border: 1px solid var(--accent); padding: 10px; margin-bottom: 20px; display: flex; gap: 15px; overflow-x: auto; }
        .nav a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .nav a:hover { background: var(--accent); color: var(--bg); }
        .page { display: none; }
        .active { display: block; }
        input, textarea, select { background: #000; border: 1px solid var(--accent); color: var(--text); padding: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .box { border: 1px solid var(--accent); padding: 15px; margin-top: 10px; background: rgba(0,255,0,0.03); }
        .msg { border-left: 2px solid var(--accent); padding: 5px 10px; margin-bottom: 10px; word-break: break-word; }
        .xp-bar { width: 100%; height: 12px; border: 1px solid var(--accent); margin-top: 5px; background: #111; }
        #xp-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease-out; }
        /* Темы оформления */
        body.old { --bg: #000; --text: #ffcc00; --accent: #ffcc00; }
        body.boykisser { --bg: #fff; --text: #ff69b4; --accent: #ffb6c1; }
        body.pnv { --bg: #000d00; --text: #00ff00; --accent: #004400; }
    </style>
</head>
<body class="classic">

<div class="nav">
    <a onclick="route('archive')">/Архив</a>
    <a onclick="route('forum')">/Форум</a>
    <a onclick="route('profile')">/Профиль</a>
    <a onclick="route('settings')">/Настройки</a>
</div>

<!-- АРХИВ (ОБЪЕКТЫ) -->
<div id="archive" class="page active">
    <h2>> РЕЕСТР_ОБЪЕКТОВ</h2>
    <div class="box" style="margin-bottom: 20px;">
        <input type="text" id="obj-title" placeholder="Название объекта">
        <input type="text" id="obj-coords" placeholder="Координаты (необязательно)">
        <textarea id="obj-desc" placeholder="Описание и состояние..."></textarea>
        <button onclick="saveObject()">ОПУБЛИКОВАТЬ ОБЪЕКТ (+50 XP)</button>
    </div>
    <div id="archive-list"></div>
</div>

<!-- ФОРУМ (ЧАТ) -->
<div id="forum" class="page">
    <h2>> КАНАЛ_СВЯЗИ</h2>
    <div id="chat-box" style="height: 400px; overflow-y: auto; border: 1px solid var(--accent); padding: 15px; margin-bottom: 10px; background: rgba(0,0,0,0.2);"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="chat-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendChat()">
        <button style="width: auto;" onclick="sendChat()">SEND</button>
    </div>
</div>

<!-- ПРОФИЛЬ -->
<div id="profile" class="page">
    <h2>> ИДЕНТИФИКАЦИЯ</h2>
    <label>ВАШ ПОЗЫВНОЙ:</label>
    <input type="text" id="nick-input" onchange="saveNick()" maxlength="20">
    <div class="box">
        <p>СТАТУС: <span id="rank-name">HACKER</span></p>
        <p>УРОВЕНЬ: <span id="lvl-val">1</span> | ОПЫТ: <span id="xp-val">0</span> / 100</p>
        <div class="xp-bar"><div id="xp-fill"></div></div>
    </div>
</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="page">
    <h2>> КОНФИГУРАЦИЯ_СИСТЕМЫ</h2>
    <label>ТЕМА ВИЗУАЛИЗАЦИИ:</label>
    <select onchange="setTheme(this.value)" id="theme-sel">
        <option value="classic">Classic Green</option>
        <option value="old">Old Terminal (Yellow)</option>
        <option value="boykisser">Boykisser:3 (Pink)</option>
        <option value="pnv">Режим ПНВ</option>
    </select>
</div>

<script>
    // 1. Инициализация Gun с публичными узлами для синхронизации через интернет
    const gun = Gun([
        'https://herokuapp.com',
        'https://herokuapp.com',
        'https://herokuapp.com'
    ]);
    
    // Имя "узла" в базе данных — лучше сделать уникальным
    const app = gun.get('digger_forum_global_v2');

    let state = {
        nick: localStorage.getItem('d_nick') || 'User' + Math.floor(Math.random()*999),
        xp: parseInt(localStorage.getItem('d_xp')) || 0,
        theme: localStorage.getItem('d_theme') || 'classic'
    };

    window.onload = () => {
        document.getElementById('nick-input').value = state.nick;
        document.getElementById('theme-sel').value = state.theme;
        setTheme(state.theme);
        updateUI();

        // 2. Слушаем ЧАТ
        app.get('chat').map().on((data, id) => {
            if(!data || document.getElementById('msg-'+id)) return;
            const div = document.createElement('div');
            div.id = 'msg-'+id;
            div.className = 'msg';
            div.innerHTML = `<small style="opacity:0.5">${new Date(data.time).toLocaleTimeString()}</small> <b>${data.author}:</b> ${data.text}`;
            const box = document.getElementById('chat-box');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // 3. Слушаем АРХИВ
        app.get('objects').map().on((data, id) => {
            if(!data || document.getElementById('obj-'+id)) return;
            const div = document.createElement('div');
            div.id = 'obj-'+id;
            div.className = 'box';
            div.innerHTML = `<strong>${data.title}</strong> <span style="color:var(--accent)">[${data.coords}]</span><br><p>${data.desc}</p><small>ID: ${data.author}</small>`;
            document.getElementById('archive-list').prepend(div);
        });
    };

    // Функции интерфейса
    window.route = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.setTheme = (t) => {
        state.theme = t;
        document.body.className = t === 'classic' ? '' : t;
        localStorage.setItem('d_theme', t);
    };

    window.saveNick = () => {
        state.nick = document.getElementById('nick-input').value || 'Anonymous';
        localStorage.setItem('d_nick', state.nick);
    };

    function updateUI() {
        const lvl = Math.floor(state.xp / 100) + 1;
        const prog = state.xp % 100;
        document.getElementById('lvl-val').innerText = lvl;
        document.getElementById('xp-val').innerText = prog;
        document.getElementById('xp-fill').style.width = prog + '%';
        localStorage.setItem('d_xp', state.xp);
    }

    // ЛОГИКА ОТПРАВКИ
    window.sendChat = () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        
        app.get('chat').set({
            author: state.nick,
            text: input.value,
            time: Date.now()
        });
        
        input.value = '';
        state.xp += 10;
        updateUI();
    };

    window.saveObject = () => {
        const title = document.getElementById('obj-title').value;
        const desc = document.getElementById('obj-desc').value;
        const coords = document.getElementById('obj-coords').value || "ЗАСЕКРЕЧЕНО";
        
        if(!title || !desc) return alert("Введите название и описание!");

        app.get('objects').set({
            title, desc, coords,
            author: state.nick,
            time: Date.now()
        });

        state.xp += 50;
        updateUI();
        document.getElementById('obj-title').value = '';
        document.getElementById('obj-desc').value = '';
    };
</script>
</body>
</html>
