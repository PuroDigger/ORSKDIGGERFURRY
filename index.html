<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORSK DIGGER PROJECT | STATIC ONLINE</title>
    <style>
        :root { --y: #ffcc00; --b: #0a0a0a; --g: #1a1a1a; --text: #e0e0e0; }
        [data-theme="boykisser"] { --y: #ff80ab; --b: #fff0f6; --text: #880e4f; }
        body { background: var(--b); color: var(--text); font-family: 'Courier New', monospace; margin: 0; transition: 0.3s; overflow-x: hidden; }
        .container { max-width: 1000px; width: 95%; margin: 0 auto; padding-bottom: 50px; }
        header { background: var(--y); color: var(--b); padding: 40px 0; text-align: center; border-bottom: 5px solid #000; }
        .logo { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #000; cursor: pointer; object-fit: cover; }
        nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        button { background: var(--g); border: 2px solid var(--y); color: var(--y); padding: 10px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button.active { background: var(--y); color: var(--b); }
        .page { display: none; min-height: 400px; }
        .page.active { display: block; }
        .card { background: var(--g); padding: 20px; border-left: 5px solid var(--y); margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--y); color: #fff; box-sizing: border-box; }
        #map-window { width: 100%; height: 500px; border: 3px solid var(--y); overflow: auto; position: relative; background: #000; }
        #map-area { position: relative; display: inline-block; }
        .marker { position: absolute; width: 20px; height: 20px; background: var(--y); border: 2px solid #000; transform: translate(-50%, -50%) rotate(45deg); cursor: pointer; }
        .xp-bar { width: 200px; height: 10px; background: #333; margin: 10px auto; border: 1px solid #000; }
        #xp-fill { height: 100%; background: var(--y); width: 0%; transition: 0.5s; }
        footer { text-align: center; padding: 20px; font-size: 12px; opacity: 0.5; border-top: 1px solid var(--y); }
    </style>
</head>
<body>

<header>
    <img src="assets/logo.png" class="logo" onclick="playMeow()">
    <h1>ORSK DIGGER PROJECT</h1>
    <div id="status-line">ПОДКЛЮЧЕНИЕ К СЕТИ...</div>
    <div class="xp-bar"><div id="xp-fill"></div></div>
    <div id="xp-val">0 XP</div>
</header>

<div class="container">
    <nav>
        <button onclick="showPage('map')" id="btn-map" class="active">КАРТА</button>
        <button onclick="showPage('blog')">АРХИВ</button>
        <button onclick="showPage('forum')">ФОРУМ</button>
        <button onclick="showPage('profile')">ПРОФИЛЬ</button>
        <button onclick="setTheme()">ТЕМЫ</button>
    </nav>

    <div id="map" class="page active">
        <p style="text-align: center; font-size: 12px;">Кликни по карте, чтобы поставить метку</p>
        <div id="map-window">
            <div id="map-area">
                <img src="assets/maposn.jpg" id="map-img" onclick="handleMapClick(event)">
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>

    <div id="blog" class="page">
        <div class="card">
            <input type="text" id="post-t" placeholder="НАЗВАНИЕ ОБЪЕКТА">
            <textarea id="post-b" placeholder="ОТЧЕТ О ЗАЛАЗЕ..."></textarea>
            <button onclick="sendPost()" style="width:100%">ОПУБЛИКОВАТЬ</button>
        </div>
        <div id="blog-feed"></div>
    </div>

    <div id="forum" class="page">
        <div class="card">
            <textarea id="forum-m" placeholder="ТВОЕ СООБЩЕНИЕ..."></textarea>
            <button onclick="sendForum()" style="width:100%">ОТПРАВИТЬ</button>
        </div>
        <div id="forum-feed"></div>
    </div>

    <div id="profile" class="page">
        <div class="card">
            <h2 id="user-name">...</h2>
            <p id="user-stat">Ранг: Загрузка...</p>
            <button onclick="localStorage.clear(); location.reload();" style="background: #500;">СБРОСИТЬ ВСЁ</button>
        </div>
    </div>
</div>

<footer>КТО ЗАДУДОСИТ ТОТ ПИДОРАС</footer>

<script>
    // --- ТВОИ ДАННЫЕ (БЕЗОПАСНО) ---
    const DB_URL = 'https://supabase.co';
    const DB_KEY = 'sb_publishable_TMgSn4UaJ1bovISkRi5ifA_8BrIdZCA';
    const HEADERS = { "apikey": DB_KEY, "Authorization": "Bearer " + DB_KEY, "Content-Type": "application/json" };

    let user = { nick: localStorage.getItem('dnick'), xp: parseInt(localStorage.getItem('dxp') || "0") };

    // --- СИСТЕМА ЗАПРОСОВ (ВМЕСТО БИБЛИОТЕКИ) ---
    async function api(table, method = 'GET', body = null) {
        const url = `${DB_URL}/${table}?select=*${method === 'GET' ? '&order=id.desc' : ''}`;
        try {
            const res = await fetch(url, { method, headers: HEADERS, body: body ? JSON.stringify(body) : null });
            if (res.ok) {
                document.getElementById('status-line').innerText = "Статус: ОНЛАЙН";
                return await res.json();
            }
        } catch (e) {
            document.getElementById('status-line').innerText = "ОФЛАЙН (Включи VPN)";
            return null;
        }
    }

    // --- ЛОГИКА ---
    window.onload = () => {
        if (!user.nick) {
            let n = prompt("ТВОЙ ПОЗЫВНОЙ:");
            if (n) { localStorage.setItem('dnick', n); location.reload(); }
        } else {
            updateXP();
            loadAll();
        }
    };

    function loadAll() {
        loadBlog();
        loadForum();
        loadMarkers();
    }

    function updateXP() {
        localStorage.setItem('dxp', user.xp);
        document.getElementById('xp-val').innerText = user.xp + " XP";
        document.getElementById('xp-fill').style.width = Math.min(user.xp, 100) + "%";
        document.getElementById('user-name').innerText = user.nick;
        const ranks = ["Школьник", "Крыса", "Лазальщик", "Диггер", "КРУТЭЛЫК"];
        let rIdx = Math.min(Math.floor(user.xp / 100), 4);
        document.getElementById('user-stat').innerText = "Ранг: " + ranks[rIdx];
    }

    async function sendPost() {
        const t = document.getElementById('post-t').value, b = document.getElementById('post-b').value;
        if (!t || !b) return;
        await api('posts', 'POST', { t, b, nick: user.nick });
        user.xp += 15; updateXP(); loadBlog();
        document.getElementById('post-t').value = ''; document.getElementById('post-b').value = '';
    }

    async function loadBlog() {
        const data = await api('posts');
        if (data) document.getElementById('blog-feed').innerHTML = data.map(p => `
            <div class="card"><b>${p.nick}</b>: <h3>${p.t}</h3><p>${p.b}</p></div>
        `).join('');
    }

    async function sendForum() {
        const msg = document.getElementById('forum-m').value;
        if (!msg) return;
        await api('forum', 'POST', { msg, nick: user.nick, category: 'flud' });
        user.xp += 5; updateXP(); loadForum();
        document.getElementById('forum-m').value = '';
    }

    async function loadForum() {
        const data = await api('forum');
        if (data) document.getElementById('forum-feed').innerHTML = data.map(m => `
            <div style="border-bottom:1px solid #333; padding:10px;"><b>${m.nick}</b>: ${m.msg}</div>
        `).join('');
    }

    async function handleMapClick(e) {
        const rect = e.target.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100, y = ((e.clientY - rect.top) / rect.height) * 100;
        const note = prompt("ЧТО ТУТ?");
        if (note) {
            await api('markers', 'POST', { note, x, y, map_file: 'maposn.jpg' });
            loadMarkers();
        }
    }

    async function loadMarkers() {
        const data = await api('markers');
        const layer = document.getElementById('marker-layer'); layer.innerHTML = '';
        if (data) data.forEach(m => {
            const el = document.createElement('div'); el.className = 'marker';
            el.style.left = m.x + "%"; el.style.top = m.y + "%"; el.title = m.note;
            layer.appendChild(el);
        });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(id !== 'profile') document.getElementById('btn-map').classList.remove('active');
    }

    function setTheme() {
        let t = document.body.getAttribute('data-theme') === 'boykisser' ? 'default' : 'boykisser';
        document.body.setAttribute('data-theme', t);
    }

    function playMeow() { new Audio('assets/meow.mp3').play().catch(()=>{}); }
</script>
</body>
</html>
